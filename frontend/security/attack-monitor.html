<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>攻击监控中心</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .btn { padding: 8px 16px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="dashboard.html">数据看板</a>
            <a href="attack-monitor.html">攻击监控</a>
            <a href="check-in.html">值机系统</a>
            <a href="#" onclick="logout()">退出登录</a>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>实时攻击日志</h1>
            <button class="btn" onclick="exportCSV()">导出 CSV</button>
        </div>

        <table id="logTable">
            <thead>
                <tr>
                    <th>时间</th>
                    <th>攻击类型</th>
                    <th>源 IP</th>
                    <th>目标 IP</th>
                    <th>详情</th>
                </tr>
            </thead>
            <tbody>
                <!-- 数据由 JS 渲染 -->
            </tbody>
        </table>
    </div>

    <script type="module">
        import { checkAuth } from './assets/js/auth.js';
        import { getAttackLogs } from './assets/js/api.js';

        checkAuth();
        let currentLogs = []; // 缓存当前数据用于导出

        async function loadLogs() {
try {
    // 假设你已经引入了 api.js 并调用了 getAttackLogs
    const result = await api.getAttackLogs(); 
    
    // 关键修改：文档中的数组在 result.data 里，而不是 result
    const logs = result.data; 
    
    // 渲染表格的逻辑...
    logs.forEach(log => {
        const row = table.insertRow();
        row.innerHTML = `
            <td>${log.id}</td>
            <td>${log.attack_type}</td> <!-- 注意字段名是 attack_type -->
            <td>${log.src_ip}</td>
            <td>${log.dst_ip}</td>
            <td>${new Date(log.create_time).toLocaleString()}</td>
        `;
    });
} catch (error) {
    console.error('加载失败:', error);
}
        }

        // 导出 CSV 功能
        window.exportCSV = () => {
            if (!currentLogs.length) return alert('暂无数据导出');
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // BOM for Excel
            csvContent += "时间,攻击类型,源IP,目标IP,详情\n";
            
            currentLogs.forEach(row => {
                csvContent += `${row.create_time},${row.attack_type},${row.src_ip},${row.dst_ip},"${row.payload_snippet}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "attack_logs.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.logout = () => {
            localStorage.removeItem('auth_token');
            window.location.href = 'login.html';
        };

        loadLogs();
    </script>
</body>
</html>
