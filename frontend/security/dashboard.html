<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>客流数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .chart-container { position: relative; height: 400px; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #333; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="dashboard.html">数据看板</a>
            <a href="attack-monitor.html">攻击监控</a>
            <a href="check-in.html">值机系统</a>
            <a href="#" onclick="logout()">退出登录</a>
        </div>
        <h1>今日运营概览</h1>
        <div class="stats-grid">
            <div class="card">
                <h3>今日总旅客数</h3>
                <p id="totalPassengers" style="font-size: 2em; color: #1890ff; margin: 0;">加载中...</p>
            </div>
            <div class="card">
                <h3>平均停留时间</h3>
                <p id="avgDwellTime" style="font-size: 2em; color: #52c41a; margin: 0;">加载中...</p>
            </div>
        </div>
        <div class="card">
            <h3>最近24小时客流趋势</h3>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        // 修改 1: 路径改为相对于 dashboard.html 的路径
        import { checkAuth } from './assets/js/auth.js';
        // 修改 2: 引入 api.js 中的方法
        import { getStats, logAction } from './assets/js/api.js'; 

        // 权限检查
        checkAuth();

        // 1. 加载统计数据
        async function loadStats() {
            try {
                // 调用接口 (注意：文档中的接口是 /api/stats)
                const data = await getStats(); 
                
                // 修改 3: 根据文档返回的数据结构修改取值方式
                // 假设文档返回 { "data": { "total_passengers": 1000, "avg_dwell_seconds": 300 } }
                // 如果结构不同，请根据实际返回调整
                document.getElementById('totalPassengers').innerText = data.data?.total_passengers || 0;
                
                const minutes = Math.round((data.data?.avg_dwell_seconds || 0) / 60);
                document.getElementById('avgDwellTime').innerText = `${minutes} 分钟`;

                // 记录访问日志 (演示 API 调用)
                await logAction({
                    module: 'dashboard',
                    level: 'info',
                    message: '用户刷新了数据看板'
                });

            } catch (e) {
                console.error("统计加载失败", e);
                document.getElementById('totalPassengers').innerText = "加载错误";
            }
        }

        // 2. 模拟图表数据 (因为文档未提供具体的图表接口)
        // 如果文档中有获取图表数据的接口，请在这里调用
        function loadChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            // 模拟数据
            const labels = Array.from({length: 24}, (_, i) => `${i}:00`);
            const data = Array.from({length: 24}, () => Math.floor(Math.random() * 100));
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '客流量',
                        data: data,
                        borderColor: '#1890ff',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(24, 144, 255, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // 退出登录函数
        window.logout = () => {
            localStorage.removeItem('auth_token');
            window.location.href = 'login.html';
        };

        // 执行加载
        loadStats();
        loadChart();
    </script>
</body>
</html>
