<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能值机系统</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>✈️ 航安系统</h2>
            <ul>
                <li><a href="dashboard.html">数据看板</a></li>
                <li><a href="attack-monitor.html">攻击监控</a></li>
                <li><a href="check-in.html" class="active">智能值机</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>柜台值机办理</h1>
            </header>

            <div class="card">
                <h3>办理登机</h3>
                <form id="checkInForm">
                    <div class="form-group">
                        <label>航班号</label>
                        <input type="text" id="flightNumber" placeholder="例如: CA1234" value="CA8888" required>
                    </div>
                    <div class="form-group">
                        <label>乘客姓名</label>
                        <input type="text" id="passengerName" placeholder="例如: 张三" value="李四" required>
                    </div>
                    <button type="submit" class="btn-primary">办理值机并记录</button>
                </form>
            </div>

            <!-- 日志显示区域 -->
            <div class="card">
                <h3>操作日志 (实时)</h3>
                <div id="logDisplay" style="height: 200px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 4px;">
                    <p>等待操作...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        // 引入 API
        import { logAction } from './assets/js/api.js';

        document.getElementById('checkInForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const flight = document.getElementById('flightNumber').value;
            const name = document.getElementById('passengerName').value;
            const btn = this.querySelector('button');

            btn.disabled = true;
            btn.innerText = '处理中...';

            try {
                // 1. 模拟值机业务逻辑 (这里只是简单的模拟)
                await new Promise(r => setTimeout(r, 800));

                // 2. 核心步骤：调用 API 文档中的接口记录日志
                // 参数参考文档：module='checkin', message='旅客xxx值机成功'
                const apiResponse = await logAction({
                    module: 'checkin', 
                    level: 'info', 
                    message: `旅客 ${name} (${flight}) 值机成功`
                });

                // 3. 更新页面显示
                if (apiResponse.success) {
                    addLog(`✅ 成功记录: ${name} - ${flight} (ID: ${apiResponse.id})`);
                }

            } catch (error) {
                addLog(`❌ 记录失败: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerText = '办理值机并记录';
            }
        });

        function addLog(text) {
            const div = document.createElement('p');
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
            document.getElementById('logDisplay').prepend(div); // 最新的在最上面
        }
    </script>
</body>
</html>
